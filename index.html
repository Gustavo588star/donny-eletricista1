<title>Donny Amaral Eletricista</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1b35;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #071428;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 50px;
    border-radius: 10px;
}

.logo-text {
    font-weight: bold;
}

nav {
    display: flex;
    gap: 20px;
    align-items: center;
}

nav a {
    color: white;
    text-decoration: none;
}

.whatsapp {
    background: orange;
    padding: 10px 20px;
    border-radius: 20px;
    color: white;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 60px 30px;
}

.hero-text {
    max-width: 600px;
}

.badge {
    background: #1e3a8a;
    display: inline-block;
    padding: 8px 15px;
    border-radius: 20px;
    margin-bottom: 20px;
}

.hero h1 {
    font-size: 50px;
    margin: 0;
}

.hero img {
    width: 350px;
    max-width: 100%;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero h1 {
        font-size: 32px;
    }

    header {
        flex-direction: column;
        gap: 10px;
    }
}
